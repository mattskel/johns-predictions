name: Deploy to droplet

on:
  push:
    branches: [master]
  workflow_dispatch:

# Cancel an in-progress deploy if a newer commit lands on master.
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to droplet
    runs-on: ubuntu-latest
    steps:
      - name: Start deploy
        run: echo "Deploying ${{ github.sha }} to production"

      - name: SSH into droplet and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -euo pipefail

            echo "==> Pulling latest code"
            cd /root/johns-predictions
            git fetch origin master
            git reset --hard origin/master

            echo "==> Writing Google credentials"
            mkdir -p secrets
            echo '${{ secrets.GOOGLE_CREDENTIALS }}' > secrets/google-api-key.json

            echo "==> Rebuilding containers"
            docker compose down --remove-orphans
            docker compose up -d --build

            echo "==> Pruning old images"
            docker image prune -f

            echo "==> Deploy complete"
